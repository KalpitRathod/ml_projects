<!DOCTYPE html>
<html lang="en">

<head>
    <title>Rocket Web</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 900px;
            margin: auto;
            margin-top: 80px;
        }

        h1 {
            text-align: center;
            font-size: 64px;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            outline: none;
        }

        button {
            padding: 18px 30px;
            border: none;
            border-radius: 12px;
            background: #38bdf8;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #search-time {
            margin-top: 15px;
            color: #94a3b8;
            font-size: 14px;
        }

        #results {
            margin-top: 40px;
        }

        .result {
            background: #1e293b;
            padding: 22px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            color: #38bdf8;
            text-decoration: none;
        }

        .title:hover {
            text-decoration: underline;
        }

        .url {
            color: #22c55e;
            margin-top: 8px;
            font-size: 14px;
            word-break: break-all;
        }

        .snippet {
            margin-top: 12px;
            line-height: 1.7;
            color: #cbd5e1;
        }

        .loading {
            text-align: center;
            margin-top: 40px;
            color: #94a3b8;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0 60px;
        }

        .page-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #1e293b;
            color: #38bdf8;
            font-size: 15px;
            cursor: pointer;
        }

        .page-btn:hover {
            background: #334155;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-indicator {
            padding: 10px 20px;
            color: #94a3b8;
            font-size: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Rocket Web</h1>

    <div class="subtitle">
        Fast search engine powered by Scrapy + SQLite + BM25
    </div>

    <div class="search-box">
        <input
            type="text"
            id="query"
            placeholder="Search the web..."
            maxlength="200"
            onkeydown="if(event.key==='Enter') runSearch(0)"
        >
        <button id="search-btn" onclick="runSearch(0)">
            Search
        </button>
    </div>

    <div id="search-time"></div>
    <div id="results"></div>
    <div id="pagination" class="pagination"></div>

</div>

<script>
// ─── State ───────────────────────────────────────────────
let currentPage   = 0;
let currentQuery  = "";
const PAGE_SIZE   = 20;

// ─── XSS Protection ──────────────────────────────────────
// ALL user-visible strings from the server must pass through
// this before being inserted into the DOM.
function escapeHtml(str) {
    const el = document.createElement("div");
    el.textContent = str ?? "";
    return el.innerHTML;
}

// The snippet already has server-side <b> highlight tags we
// want to keep, but everything *outside* those tags must be
// safe. We strip every tag except <b> and </b>.
function sanitizeSnippet(raw) {
    const el = document.createElement("div");
    el.textContent = raw ?? "";
    // Restore only the exact highlight markup the server injects
    return el.innerHTML
        .replace(/&lt;b style="color:#facc15"&gt;/g,
                 '<b style="color:#facc15">')
        .replace(/&lt;\/b&gt;/g, "</b>");
}

// ─── Search ───────────────────────────────────────────────
async function runSearch(page) {
    const q = document.getElementById("query").value.trim();
    if (!q) return;

    currentQuery = q;
    currentPage  = page;

    const btn = document.getElementById("search-btn");
    btn.disabled = true;

    document.getElementById("results").innerHTML =
        `<div class="loading">Searching...</div>`;
    document.getElementById("pagination").innerHTML = "";
    document.getElementById("search-time").innerHTML = "";

    const start = performance.now();

    try {
        const resp = await fetch(
            `/search?q=${encodeURIComponent(q)}&page=${page}`
        );
        const data = await resp.json();
        const elapsed = ((performance.now() - start) / 1000).toFixed(3);

        document.getElementById("search-time").innerHTML =
            `${data.length} results in ${elapsed}s`;

        renderResults(data);
        renderPagination(data.length);

    } catch (err) {
        document.getElementById("results").innerHTML =
            `<div class="result">Search failed. Please try again.</div>`;
        console.error(err);
    } finally {
        btn.disabled = false;
    }
}

// ─── Render Results ───────────────────────────────────────
function renderResults(data) {
    if (data.length === 0) {
        document.getElementById("results").innerHTML =
            `<div class="result">No results found.</div>`;
        return;
    }

    // Build DOM nodes — never set innerHTML with raw server data
    const container = document.getElementById("results");
    container.innerHTML = "";

    data.forEach(item => {
        const card    = document.createElement("div");
        card.className = "result";

        // Title — safe anchor built via DOM API
        const anchor  = document.createElement("a");
        anchor.className = "title";
        anchor.href      = item.url;          // href is safe: no script injection via href in modern browsers
        anchor.target    = "_blank";
        anchor.rel       = "noopener noreferrer";
        anchor.textContent = item.title;      // textContent, not innerHTML
        anchor.addEventListener("click", () => trackClick(item.url));

        // URL label
        const urlDiv  = document.createElement("div");
        urlDiv.className = "url";
        urlDiv.textContent = item.url;        // textContent — safe

        // Snippet — server highlight tags are whitelisted, rest escaped
        const snipDiv = document.createElement("div");
        snipDiv.className = "snippet";
        snipDiv.innerHTML = sanitizeSnippet(item.snippet);

        card.appendChild(anchor);
        card.appendChild(urlDiv);
        card.appendChild(snipDiv);
        container.appendChild(card);
    });
}

// ─── Pagination ───────────────────────────────────────────
function renderPagination(resultCount) {
    const pg = document.getElementById("pagination");
    pg.innerHTML = "";

    // Only show pagination if there's something to page through
    if (currentPage === 0 && resultCount < PAGE_SIZE) return;

    const prevBtn = document.createElement("button");
    prevBtn.className  = "page-btn";
    prevBtn.textContent = "← Previous";
    prevBtn.disabled   = currentPage === 0;
    prevBtn.onclick    = () => runSearch(currentPage - 1);

    const label = document.createElement("span");
    label.className   = "page-indicator";
    label.textContent = `Page ${currentPage + 1}`;

    const nextBtn = document.createElement("button");
    nextBtn.className  = "page-btn";
    nextBtn.textContent = "Next →";
    nextBtn.disabled   = resultCount < PAGE_SIZE;
    nextBtn.onclick    = () => runSearch(currentPage + 1);

    pg.appendChild(prevBtn);
    pg.appendChild(label);
    pg.appendChild(nextBtn);
}

// ─── Click Tracking ───────────────────────────────────────
async function trackClick(url) {
    try {
        await fetch(`/click?url=${encodeURIComponent(url)}`, {
            method: "POST"
        });
    } catch (e) {
        console.warn("Click tracking failed:", e);
    }
}
</script>

</body>
</html>
